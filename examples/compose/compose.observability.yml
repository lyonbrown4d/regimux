services:
  regimux:
    image: ${REGIMUX_IMAGE:-ghcr.io/lyonbrown4d/regimux:latest}
    container_name: regimux
    restart: unless-stopped
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    environment:
      REGIMUX_SERVER__PUBLIC_URL: ${REGIMUX_SERVER__PUBLIC_URL:-http://localhost:8080}
      REGIMUX_CACHE__BACKEND: memory
    ports:
      - "${REGIMUX_HTTP_PORT:-8080}:8080"
    volumes:
      - regimux-data:/var/lib/regimux
      - ./configs/memory.hcl:/etc/regimux/regimux.hcl:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/livez >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  prometheus:
    image: prom/prometheus:latest
    container_name: regimux-prometheus
    restart: unless-stopped
    depends_on:
      regimux:
        condition: service_healthy
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: regimux-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/regimux-overview.json
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-regimux}
    ports:
      - "${GRAFANA_HTTP_PORT:-3000}:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana

volumes:
  regimux-data:
  prometheus-data:
  grafana-data:
