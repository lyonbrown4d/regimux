services:
  regimux:
    image: ${REGIMUX_IMAGE:-ghcr.io/lyonbrown4d/regimux:latest}
    container_name: regimux
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    environment:
      REGIMUX_SERVER__PUBLIC_URL: ${REGIMUX_SERVER__PUBLIC_URL:-http://localhost:5000}
      REGIMUX_CACHE__BACKEND: redis
      REGIMUX_CACHE__REDIS__ADDRS: redis:6379
      REGIMUX_SCHEDULER__DISTRIBUTED_LOCK: "true"
    ports:
      - "${REGIMUX_HTTP_PORT:-5000}:5000"
    volumes:
      - regimux-data:/var/lib/regimux
      - ./configs/redis.hcl:/etc/regimux/regimux.hcl:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5000/healthz >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: regimux-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  regimux-data:
  redis-data:
