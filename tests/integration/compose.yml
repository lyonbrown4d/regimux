name: regimux-integration

services:
  redis:
    image: ${REGIMUX_INTEGRATION_REDIS_IMAGE:-redis:7-alpine}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 30

  mysql:
    image: ${REGIMUX_INTEGRATION_MYSQL_IMAGE:-mysql:8.4}
    profiles: ["mysql"]
    environment:
      MYSQL_DATABASE: regimux
      MYSQL_USER: regimux
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root-secret
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uregimux -psecret --silent"]
      interval: 2s
      timeout: 5s
      retries: 60

  postgres:
    image: ${REGIMUX_INTEGRATION_POSTGRES_IMAGE:-postgres:16-alpine}
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: regimux
      POSTGRES_USER: regimux
      POSTGRES_PASSWORD: secret
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U regimux -d regimux"]
      interval: 2s
      timeout: 5s
      retries: 60

  fake-registry:
    image: ${REGIMUX_INTEGRATION_PYTHON_IMAGE:-python:3.12-alpine}
    profiles: ["multi"]
    environment:
      REGIMUX_FAKE_REGISTRY_CHUNK_DELAY_SECONDS: ${REGIMUX_FAKE_REGISTRY_CHUNK_DELAY_SECONDS:-0.01}
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: ["python", "/scripts/fake-registry.py"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/healthz', timeout=2).read()"]
      interval: 2s
      timeout: 5s
      retries: 30

  regimux:
    image: ${REGIMUX_IMAGE:-regimux-integration:latest-amd64}
    command: ["--config", "/etc/regimux/integration.hcl"]
    ports:
      - "${REGIMUX_INTEGRATION_PORT:-18080}:8080"
    environment:
      REGIMUX_STORE__META__DRIVER: ${REGIMUX_META_DRIVER:-sqlite}
      REGIMUX_STORE__META__DSN: ${REGIMUX_META_DSN:-}
    volumes:
      - ./config/regimux.hcl:/etc/regimux/integration.hcl:ro
      - regimux-data:/var/lib/regimux
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/livez >/dev/null 2>&1 || exit 1"]
      interval: 2s
      timeout: 2s
      retries: 30

  regimux-a:
    image: ${REGIMUX_IMAGE:-regimux-integration:latest-amd64}
    profiles: ["multi"]
    command: ["--config", "/etc/regimux/integration.hcl"]
    ports:
      - "${REGIMUX_INTEGRATION_A_PORT:-18081}:8080"
    environment:
      REGIMUX_STORE__META__DRIVER: ${REGIMUX_META_DRIVER:-sqlite}
      REGIMUX_STORE__META__DSN: ${REGIMUX_META_DSN:-}
    volumes:
      - ./config/regimux.multi.hcl:/etc/regimux/integration.hcl:ro
      - regimux-multi-data:/var/lib/regimux
    depends_on:
      redis:
        condition: service_healthy
      fake-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/livez >/dev/null 2>&1 || exit 1"]
      interval: 2s
      timeout: 2s
      retries: 30

  regimux-b:
    image: ${REGIMUX_IMAGE:-regimux-integration:latest-amd64}
    profiles: ["multi"]
    command: ["--config", "/etc/regimux/integration.hcl"]
    ports:
      - "${REGIMUX_INTEGRATION_B_PORT:-18082}:8080"
    environment:
      REGIMUX_STORE__META__DRIVER: ${REGIMUX_META_DRIVER:-sqlite}
      REGIMUX_STORE__META__DSN: ${REGIMUX_META_DSN:-}
    volumes:
      - ./config/regimux.multi.hcl:/etc/regimux/integration.hcl:ro
      - regimux-multi-data:/var/lib/regimux
    depends_on:
      redis:
        condition: service_healthy
      fake-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/livez >/dev/null 2>&1 || exit 1"]
      interval: 2s
      timeout: 2s
      retries: 30

  dind:
    image: ${REGIMUX_INTEGRATION_DIND_IMAGE:-docker:27-dind}
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    command:
      - --host=tcp://0.0.0.0:2375
      - --host=unix:///var/run/docker.sock
      - --insecure-registry=regimux:8080
    depends_on:
      regimux:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 2s
      timeout: 5s
      retries: 60

  npm-client:
    image: ${REGIMUX_INTEGRATION_NODE_IMAGE:-node:22-alpine}
    profiles: ["clients"]
    environment:
      REGIMUX_INTEGRATION_CONCURRENCY: ${REGIMUX_INTEGRATION_CONCURRENCY:-4}
    volumes:
      - ./scripts:/scripts:ro
    depends_on:
      regimux:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/scripts/npm-client.sh"]

  pypi-client:
    image: ${REGIMUX_INTEGRATION_PYTHON_IMAGE:-python:3.12-alpine}
    profiles: ["clients"]
    environment:
      REGIMUX_INTEGRATION_CONCURRENCY: ${REGIMUX_INTEGRATION_CONCURRENCY:-4}
    volumes:
      - ./scripts:/scripts:ro
    depends_on:
      regimux:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/scripts/pypi-client.sh"]

  maven-client:
    image: ${REGIMUX_INTEGRATION_MAVEN_IMAGE:-maven:3.9-eclipse-temurin-21-alpine}
    profiles: ["clients"]
    environment:
      REGIMUX_INTEGRATION_CONCURRENCY: ${REGIMUX_INTEGRATION_CONCURRENCY:-4}
    volumes:
      - ./scripts:/scripts:ro
    depends_on:
      regimux:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/scripts/maven-client.sh"]

  go-client:
    image: ${REGIMUX_INTEGRATION_GO_IMAGE:-golang:1.26-alpine}
    profiles: ["clients"]
    environment:
      REGIMUX_INTEGRATION_CONCURRENCY: ${REGIMUX_INTEGRATION_CONCURRENCY:-4}
    volumes:
      - ./scripts:/scripts:ro
    depends_on:
      regimux:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/scripts/go-client.sh"]

  container-client:
    image: ${REGIMUX_INTEGRATION_DOCKER_CLI_IMAGE:-docker:27-cli}
    profiles: ["clients"]
    environment:
      DOCKER_HOST: tcp://dind:2375
      DOCKER_TLS_CERTDIR: ""
      REGIMUX_INTEGRATION_CONCURRENCY: ${REGIMUX_INTEGRATION_CONCURRENCY:-4}
      REGIMUX_CONTAINER_IMAGES: "regimux:8080/library/busybox:1.36.1 regimux:8080/hub/library/busybox:1.36.1 regimux:8080/moby/buildkit:buildx-stable-1"
    volumes:
      - ./scripts:/scripts:ro
    depends_on:
      dind:
        condition: service_healthy
      regimux:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/scripts/container-client.sh"]

  multi-replica-client:
    image: ${REGIMUX_INTEGRATION_PYTHON_IMAGE:-python:3.12-alpine}
    profiles: ["multi"]
    volumes:
      - ./scripts:/scripts:ro
    depends_on:
      fake-registry:
        condition: service_healthy
      regimux-a:
        condition: service_healthy
      regimux-b:
        condition: service_healthy
    entrypoint: ["python", "/scripts/multi-replica-client.py"]

  k6:
    image: ${REGIMUX_STRESS_K6_IMAGE:-grafana/k6:latest}
    profiles: ["stress"]
    environment:
      REGIMUX_BASE_URL: ${REGIMUX_BASE_URL:-http://regimux:8080}
      REGIMUX_STRESS_PROFILE: ${REGIMUX_STRESS_PROFILE:-load}
      REGIMUX_K6_REPORT_DIR: /stress/reports
      REGIMUX_K6_REPORT_NAME: ${REGIMUX_K6_REPORT_NAME:-}
    volumes:
      - ../stress/k6:/stress/k6:ro
      - ../stress/reports:/stress/reports
    depends_on:
      regimux:
        condition: service_healthy
    entrypoint: ["k6"]

volumes:
  regimux-data:
  regimux-multi-data:
