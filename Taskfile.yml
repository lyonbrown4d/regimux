version: "3"

vars:
  INTEGRATION_COMPOSE: tests/integration/compose.yml

tasks:
  test:
    desc: Run unit tests.
    cmds:
      - go test ./...

  lint:
    desc: Run golangci-lint.
    cmds:
      - golangci-lint run ./...

  release:local:
    desc: Run the cross-platform local release helper.
    cmds:
      - go run ./build release {{.CLI_ARGS}}

  integration:image:
    desc: Build the local RegiMux container image with GoReleaser.
    env:
      REGISTRY_IMAGE: regimux-integration
    cmds:
      - go run github.com/goreleaser/goreleaser/v2@latest release --snapshot --clean --config .goreleaser.integration.yaml

  integration:up:
    desc: Start the integration test environment.
    deps:
      - integration:image
    cmds:
      - docker compose -f {{.INTEGRATION_COMPOSE}} up -d --wait redis regimux dind

  integration:mysql:up:
    desc: Start the integration test environment with MySQL metadata storage.
    deps:
      - integration:image
    env:
      REGIMUX_META_DRIVER: mysql
      REGIMUX_META_DSN: "regimux:secret@tcp(mysql:3306)/regimux?parseTime=true&multiStatements=true"
    cmds:
      - docker compose -f {{.INTEGRATION_COMPOSE}} --profile mysql up -d --wait redis mysql
      - docker compose -f {{.INTEGRATION_COMPOSE}} --profile mysql up -d --wait regimux dind

  integration:postgres:up:
    desc: Start the integration test environment with Postgres metadata storage.
    deps:
      - integration:image
    env:
      REGIMUX_META_DRIVER: postgres
      REGIMUX_META_DSN: "postgres://regimux:secret@postgres:5432/regimux?sslmode=disable"
    cmds:
      - docker compose -f {{.INTEGRATION_COMPOSE}} --profile postgres up -d --wait redis postgres
      - docker compose -f {{.INTEGRATION_COMPOSE}} --profile postgres up -d --wait regimux dind

  integration:deps:
    desc: Run npm, PyPI, Maven, and Go proxy integration checks.
    cmds:
      - task: integration:up
      - task: integration:deps:run

  integration:deps:run:
    desc: Run npm, PyPI, Maven, and Go proxy client containers.
    cmds:
      - task: integration:npm:run
      - task: integration:pypi:run
      - task: integration:maven:run
      - task: integration:go:run

  integration:npm:run:
    desc: Run the npm proxy integration client.
    cmds:
      - docker compose -f {{.INTEGRATION_COMPOSE}} run --rm npm-client

  integration:pypi:run:
    desc: Run the PyPI proxy integration client.
    cmds:
      - docker compose -f {{.INTEGRATION_COMPOSE}} run --rm pypi-client

  integration:maven:run:
    desc: Run the Maven proxy integration client.
    cmds:
      - docker compose -f {{.INTEGRATION_COMPOSE}} run --rm maven-client

  integration:go:run:
    desc: Run the Go module proxy integration client.
    cmds:
      - docker compose -f {{.INTEGRATION_COMPOSE}} run --rm go-client

  integration:container:
    desc: Run the DinD container registry integration check.
    cmds:
      - task: integration:up
      - task: integration:container:run

  integration:container:run:
    desc: Pull Debian, Ubuntu, and BuildKit images through RegiMux from DinD.
    cmds:
      - docker compose -f {{.INTEGRATION_COMPOSE}} run --rm container-client

  integration:replicas:up:
    desc: Start two RegiMux replicas sharing Redis, metadata, and object storage.
    deps:
      - integration:image
    cmds:
      - docker compose -f {{.INTEGRATION_COMPOSE}} --profile multi up -d --wait redis fake-registry
      - docker compose -f {{.INTEGRATION_COMPOSE}} --profile multi up -d --wait regimux-a
      - docker compose -f {{.INTEGRATION_COMPOSE}} --profile multi up -d --wait regimux-b

  integration:replicas:mysql:up:
    desc: Start the multi-replica integration environment with MySQL metadata storage.
    deps:
      - integration:image
    env:
      REGIMUX_META_DRIVER: mysql
      REGIMUX_META_DSN: "regimux:secret@tcp(mysql:3306)/regimux?parseTime=true&multiStatements=true"
    cmds:
      - docker compose -f {{.INTEGRATION_COMPOSE}} --profile multi --profile mysql up -d --wait redis fake-registry mysql
      - docker compose -f {{.INTEGRATION_COMPOSE}} --profile multi --profile mysql up -d --wait regimux-a
      - docker compose -f {{.INTEGRATION_COMPOSE}} --profile multi --profile mysql up -d --wait regimux-b

  integration:replicas:postgres:up:
    desc: Start the multi-replica integration environment with Postgres metadata storage.
    deps:
      - integration:image
    env:
      REGIMUX_META_DRIVER: postgres
      REGIMUX_META_DSN: "postgres://regimux:secret@postgres:5432/regimux?sslmode=disable"
    cmds:
      - docker compose -f {{.INTEGRATION_COMPOSE}} --profile multi --profile postgres up -d --wait redis fake-registry postgres
      - docker compose -f {{.INTEGRATION_COMPOSE}} --profile multi --profile postgres up -d --wait regimux-a
      - docker compose -f {{.INTEGRATION_COMPOSE}} --profile multi --profile postgres up -d --wait regimux-b

  integration:replicas:run:
    desc: Verify a concurrent blob pull waits on the peer replica and then hits shared storage.
    cmds:
      - docker compose -f {{.INTEGRATION_COMPOSE}} --profile multi run --rm multi-replica-client

  integration:replicas:
    desc: Run the multi-replica shared-cache integration check with sqlite metadata storage.
    cmds:
      - task: integration:down
      - task: integration:replicas:up
      - defer:
          task: integration:down
      - task: integration:replicas:run

  integration:replicas:mysql:
    desc: Run the multi-replica shared-cache integration check with MySQL metadata storage.
    cmds:
      - task: integration:down
      - task: integration:replicas:mysql:up
      - defer:
          task: integration:down
      - task: integration:replicas:run

  integration:replicas:postgres:
    desc: Run the multi-replica shared-cache integration check with Postgres metadata storage.
    cmds:
      - task: integration:down
      - task: integration:replicas:postgres:up
      - defer:
          task: integration:down
      - task: integration:replicas:run

  integration:replicas:databases:
    desc: Run the multi-replica shared-cache check against sqlite, MySQL, and Postgres metadata stores.
    cmds:
      - task: integration:replicas
      - task: integration:replicas:mysql
      - task: integration:replicas:postgres

  integration:clients:run:
    desc: Run all integration client containers sequentially against the current RegiMux instance.
    cmds:
      - task: integration:deps:run
      - task: integration:container:run

  integration:mixed:run:
    desc: Run all integration clients concurrently against the same RegiMux instance.
    cmds:
      - docker compose -f {{.INTEGRATION_COMPOSE}} up --no-deps --force-recreate --renew-anon-volumes --abort-on-container-failure npm-client pypi-client maven-client go-client container-client

  integration:sqlite:
    desc: Run the full integration suite with sqlite metadata storage.
    cmds:
      - task: integration:up
      - defer:
          task: integration:down
      - task: integration:mixed:run

  integration:
    desc: Run the default sqlite Docker Compose integration suite.
    cmds:
      - task: integration:sqlite

  integration:mysql:
    desc: Run the full integration suite with MySQL metadata storage.
    cmds:
      - task: integration:mysql:up
      - defer:
          task: integration:down
      - task: integration:mixed:run

  integration:postgres:
    desc: Run the full integration suite with Postgres metadata storage.
    cmds:
      - task: integration:postgres:up
      - defer:
          task: integration:down
      - task: integration:mixed:run

  integration:databases:
    desc: Run the integration suite against sqlite, MySQL, and Postgres metadata stores.
    cmds:
      - task: integration:sqlite
      - task: integration:mysql
      - task: integration:postgres

  stress:run:
    desc: Run the k6 stress script against the current integration environment.
    cmds:
      - docker compose -f {{.INTEGRATION_COMPOSE}} --profile stress run --rm k6 run --quiet /stress/k6/regimux.js

  stress:smoke:
    desc: Run a short k6 smoke profile against sqlite metadata storage.
    cmds:
      - task: integration:up
      - defer:
          task: integration:down
      - docker compose -f {{.INTEGRATION_COMPOSE}} --profile stress run --rm -e REGIMUX_STRESS_PROFILE=smoke -e REGIMUX_STRESS_META_STORE=sqlite -e REGIMUX_K6_REPORT_NAME=regimux-stress-sqlite-smoke k6 run --quiet /stress/k6/regimux.js

  stress:
    desc: Run the default k6 load profile against sqlite metadata storage.
    cmds:
      - task: integration:up
      - defer:
          task: integration:down
      - docker compose -f {{.INTEGRATION_COMPOSE}} --profile stress run --rm -e REGIMUX_STRESS_PROFILE=load -e REGIMUX_STRESS_META_STORE=sqlite -e REGIMUX_K6_REPORT_NAME=regimux-stress-sqlite-load k6 run --quiet /stress/k6/regimux.js

  stress:mysql:
    desc: Run the default k6 load profile against MySQL metadata storage.
    cmds:
      - task: integration:mysql:up
      - defer:
          task: integration:down
      - docker compose -f {{.INTEGRATION_COMPOSE}} --profile stress run --rm -e REGIMUX_STRESS_PROFILE=load -e REGIMUX_STRESS_META_STORE=mysql -e REGIMUX_K6_REPORT_NAME=regimux-stress-mysql-load k6 run --quiet /stress/k6/regimux.js

  stress:postgres:
    desc: Run the default k6 load profile against Postgres metadata storage.
    cmds:
      - task: integration:postgres:up
      - defer:
          task: integration:down
      - docker compose -f {{.INTEGRATION_COMPOSE}} --profile stress run --rm -e REGIMUX_STRESS_PROFILE=load -e REGIMUX_STRESS_META_STORE=postgres -e REGIMUX_K6_REPORT_NAME=regimux-stress-postgres-load k6 run --quiet /stress/k6/regimux.js

  stress:compare:
    desc: Generate sqlite, MySQL, and Postgres k6 stress comparison reports.
    cmds:
      - docker compose -f {{.INTEGRATION_COMPOSE}} --profile stress run --rm --no-deps -e REGIMUX_K6_COMPARE_REPORT_NAME=regimux-stress-load-comparison k6 run --quiet /stress/k6/compare.js

  stress:databases:
    desc: Run the k6 load profile against sqlite, MySQL, and Postgres metadata stores and compare reports.
    cmds:
      - task: stress
      - task: stress:mysql
      - task: stress:postgres
      - task: stress:compare

  integration:down:
    desc: Stop and remove the integration test environment.
    cmds:
      - docker compose -f {{.INTEGRATION_COMPOSE}} --profile clients --profile mysql --profile postgres --profile multi down -v --remove-orphans
