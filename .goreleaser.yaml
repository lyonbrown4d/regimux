# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: regimux

before:
  hooks:
    - go mod download

builds:
  - id: regimuxd-linux
    main: ./cmd/regimuxd
    binary: regimuxd
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
      - -buildvcs=true
    ldflags:
      - -s -w -buildid=
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - linux
    goarch:
      - amd64
      - arm64

  - id: regimuxd-darwin
    main: ./cmd/regimuxd
    binary: regimuxd
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
      - -buildvcs=true
    ldflags:
      - -s -w -buildid=
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - darwin
    goarch:
      - amd64
      - arm64

  - id: regimuxd-windows
    main: ./cmd/regimuxd
    binary: regimuxd
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
      - -buildvcs=true
    ldflags:
      - -s -w -buildid=
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - windows
    goarch:
      - amd64
      - arm64

upx:
  - enabled: true
    ids:
      - regimuxd-linux
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    compress: best
    lzma: true

archives:
  - id: regimuxd
    ids:
      - regimuxd-linux
      - regimuxd-darwin
      - regimuxd-windows
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - configs/regimux.minimal.hcl
      - configs/regimux.full.hcl
      - configs/split/*.hcl

  - id: regimuxd-windows-exe
    ids:
      - regimuxd-windows
    formats:
      - binary
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

nfpms:
  - id: regimuxd-linux-packages
    package_name: regimuxd
    ids:
      - regimuxd-linux
    vendor: RegiMux
    homepage: https://github.com/lyonbrown4d/regimux
    maintainer: RegiMux Maintainers <noreply@github.com>
    description: Read-only OCI and Docker Registry V2 multi-upstream proxy mirror gateway.
    license: UNKNOWN
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    section: utils
    priority: optional
    release: 1
    contents:
      - src: configs/regimux.minimal.hcl
        dst: /etc/regimux/regimux.hcl
        type: config|noreplace
        file_info:
          mode: 0644
      - src: packaging/systemd/regimuxd.service
        dst: /lib/systemd/system/regimuxd.service
        file_info:
          mode: 0644
      - dst: /var/lib/regimux
        type: dir
        file_info:
          mode: 0755

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

dockers_v2:
  - id: regimuxd-alpine
    ids:
      - regimuxd-linux
    dockerfile: docker/alpine.Dockerfile
    images:
      - "{{ .Env.REGISTRY_IMAGE }}"
      - "{{ .Env.DOCKERHUB_IMAGE }}"
    tags:
      - "{{ .Tag }}"
      - "{{ .Tag }}-alpine"
      - "{{ .Version }}"
      - "{{ .Version }}-alpine"
      - latest
      - alpine
    extra_files:
      - configs/regimux.minimal.hcl
    labels:
      "org.opencontainers.image.title": "{{ .ProjectName }}"
      "org.opencontainers.image.description": "Read-only OCI and Docker Registry V2 multi-upstream proxy mirror gateway"
      "org.opencontainers.image.source": "{{ .GitURL }}"
      "org.opencontainers.image.revision": "{{ .FullCommit }}"
      "org.opencontainers.image.version": "{{ .Version }}"
    annotations:
      "org.opencontainers.image.title": "{{ .ProjectName }}"
      "org.opencontainers.image.source": "{{ .GitURL }}"
      "org.opencontainers.image.revision": "{{ .FullCommit }}"
      "org.opencontainers.image.version": "{{ .Version }}"
    platforms:
      - linux/amd64
      - linux/arm64

  - id: regimuxd-debian
    ids:
      - regimuxd-linux
    dockerfile: docker/debian.Dockerfile
    images:
      - "{{ .Env.REGISTRY_IMAGE }}"
      - "{{ .Env.DOCKERHUB_IMAGE }}"
    tags:
      - "{{ .Tag }}-debian"
      - "{{ .Version }}-debian"
      - latest-debian
      - debian
    extra_files:
      - configs/regimux.minimal.hcl
    labels:
      "org.opencontainers.image.title": "{{ .ProjectName }}"
      "org.opencontainers.image.description": "Read-only OCI and Docker Registry V2 multi-upstream proxy mirror gateway"
      "org.opencontainers.image.source": "{{ .GitURL }}"
      "org.opencontainers.image.revision": "{{ .FullCommit }}"
      "org.opencontainers.image.version": "{{ .Version }}"
    annotations:
      "org.opencontainers.image.title": "{{ .ProjectName }}"
      "org.opencontainers.image.source": "{{ .GitURL }}"
      "org.opencontainers.image.revision": "{{ .FullCommit }}"
      "org.opencontainers.image.version": "{{ .Version }}"
    platforms:
      - linux/amd64
      - linux/arm64
