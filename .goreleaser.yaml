# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: regimux

before:
  hooks:
    - go mod download

builds:
  - id: regimuxd
    main: ./cmd/regimuxd
    binary: regimuxd
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
      - -buildvcs=true
    ldflags:
      - -s -w -buildid=
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

upx:
  - enabled: true
    ids:
      - regimuxd
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    compress: best
    lzma: true

archives:
  - id: regimuxd
    ids:
      - regimuxd
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - configs/regimux.minimal.hcl
      - configs/regimux.full.hcl

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

dockers_v2:
  - id: regimuxd-alpine
    ids:
      - regimuxd
    dockerfile: docker/alpine.Dockerfile
    images:
      - "{{ .Env.REGISTRY_IMAGE }}"
    tags:
      - "{{ .Tag }}"
      - "{{ .Tag }}-alpine"
      - "{{ .Version }}"
      - "{{ .Version }}-alpine"
      - latest
      - alpine
    extra_files:
      - configs/regimux.minimal.hcl
    labels:
      "org.opencontainers.image.title": "{{ .ProjectName }}"
      "org.opencontainers.image.description": "Read-only OCI and Docker Registry V2 multi-upstream proxy mirror gateway"
      "org.opencontainers.image.source": "{{ .GitURL }}"
      "org.opencontainers.image.revision": "{{ .FullCommit }}"
      "org.opencontainers.image.version": "{{ .Version }}"
    annotations:
      "org.opencontainers.image.title": "{{ .ProjectName }}"
      "org.opencontainers.image.source": "{{ .GitURL }}"
      "org.opencontainers.image.revision": "{{ .FullCommit }}"
      "org.opencontainers.image.version": "{{ .Version }}"
    platforms:
      - linux/amd64
      - linux/arm64

  - id: regimuxd-debian
    ids:
      - regimuxd
    dockerfile: docker/debian.Dockerfile
    images:
      - "{{ .Env.REGISTRY_IMAGE }}"
    tags:
      - "{{ .Tag }}-debian"
      - "{{ .Version }}-debian"
      - latest-debian
      - debian
    extra_files:
      - configs/regimux.minimal.hcl
    labels:
      "org.opencontainers.image.title": "{{ .ProjectName }}"
      "org.opencontainers.image.description": "Read-only OCI and Docker Registry V2 multi-upstream proxy mirror gateway"
      "org.opencontainers.image.source": "{{ .GitURL }}"
      "org.opencontainers.image.revision": "{{ .FullCommit }}"
      "org.opencontainers.image.version": "{{ .Version }}"
    annotations:
      "org.opencontainers.image.title": "{{ .ProjectName }}"
      "org.opencontainers.image.source": "{{ .GitURL }}"
      "org.opencontainers.image.revision": "{{ .FullCommit }}"
      "org.opencontainers.image.version": "{{ .Version }}"
    platforms:
      - linux/amd64
      - linux/arm64
