server:
  listen: ":5000"
  public_url: "http://localhost:5000"
  read_timeout: 30s
  write_timeout: 0s
  idle_timeout: 120s

log:
  level: info
  console: true
  no_color: true
  add_caller: false

cache:
  manifest:
    tag_ttl: 10m
    stale_if_error: true
    max_stale: 168h
  blob:
    stream_and_cache: false
  tags:
    ttl: 5m
    max_page_size: 1000
  referrers:
    ttl: 5m
    fallback_tag: true

upstreams:
  hub:
    registry: https://registry-1.docker.io
    default_namespace: library
    tag_ttl: 10m
    auth:
      type: anonymous
  ghcr:
    registry: https://ghcr.io
    tag_ttl: 5m
    auth:
      type: anonymous
  quay:
    registry: https://quay.io
    tag_ttl: 5m
    auth:
      type: anonymous
  k8s:
    registry: https://registry.k8s.io
    tag_ttl: 30m
    auth:
      type: anonymous

