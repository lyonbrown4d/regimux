name: nightly

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  nightly:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Test
        run: go test ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m ./...

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        run: echo "REGISTRY_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Build Linux binaries
        run: |
          mkdir -p linux/amd64 linux/arm64
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -buildvcs=false -o linux/amd64/regimuxd ./cmd/regimuxd
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -buildvcs=false -o linux/arm64/regimuxd ./cmd/regimuxd

      - name: Build and push nightly images
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/alpine.Dockerfile
          platforms: |
            linux/amd64
            linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY_IMAGE }}:nightly
            ${{ env.REGISTRY_IMAGE }}:nightly-alpine
            ${{ env.REGISTRY_IMAGE }}:nightly-${{ github.sha }}
            ${{ env.REGISTRY_IMAGE }}:nightly-alpine-${{ github.sha }}

      - name: Build and push nightly debian image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/debian.Dockerfile
          platforms: |
            linux/amd64
            linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY_IMAGE }}:nightly-debian
            ${{ env.REGISTRY_IMAGE }}:nightly-debian-${{ github.sha }}
