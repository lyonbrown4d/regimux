<div class="grid gap-5 lg:grid-cols-[minmax(0,1fr)_minmax(22rem,28rem)]">
  <section class="rounded border border-zinc-800 bg-zinc-900/50">
    <div class="border-b border-zinc-800 px-4 py-3">
      <h2 class="text-sm font-semibold text-zinc-100">{{t . "section.manual_sync"}}</h2>
      <p class="mt-1 text-xs text-zinc-500">{{t . "hint.manual_sync"}}</p>
    </div>
    <form method="post" action="{{.BasePath}}/sync" hx-post="{{.BasePath}}/sync" hx-target="#sync-result" hx-swap="outerHTML" hx-disabled-elt="button[type='submit']" class="grid gap-4 p-4">
      {{if .CSRFToken}}<input type="hidden" name="_csrf" value="{{.CSRFToken}}">{{end}}
      <label class="grid gap-1.5 text-sm">
        <span class="text-zinc-400">{{t . "field.alias"}}</span>
        <select name="upstream_alias" class="rounded border border-zinc-800 bg-zinc-950 px-3 py-2 text-zinc-100 outline-none ring-cyan-500/30 focus:ring-2">
          {{range values .Sync.Upstreams}}
            <option value="{{.Value}}" {{if .Selected}}selected{{end}}>{{.Ecosystem}}/{{.Alias}} - {{.Registry}}</option>
          {{end}}
        </select>
      </label>
      <label class="grid gap-1.5 text-sm">
        <span class="text-zinc-400">{{t . "field.repository"}}</span>
        <input name="repository" value="{{.Sync.Form.Repository}}" placeholder="gitlab/gitlab-ce" class="rounded border border-zinc-800 bg-zinc-950 px-3 py-2 text-zinc-100 outline-none ring-cyan-500/30 focus:ring-2">
      </label>
      <label class="grid gap-1.5 text-sm">
        <span class="text-zinc-400">{{t . "field.reference"}}</span>
        <input name="reference" value="{{.Sync.Form.Reference}}" placeholder="latest" class="rounded border border-zinc-800 bg-zinc-950 px-3 py-2 text-zinc-100 outline-none ring-cyan-500/30 focus:ring-2">
      </label>
      <div class="flex flex-wrap items-center justify-between gap-3">
        <p class="text-xs text-zinc-500">{{t . "hint.manual_sync_examples"}}</p>
        <button type="submit" class="rounded bg-cyan-500 px-3 py-2 text-sm font-medium text-zinc-950 hover:bg-cyan-400">{{t . "action.sync_now"}}</button>
      </div>
    </form>
  </section>

  {{template "partials/sync_result" .}}
</div>
